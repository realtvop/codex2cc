server:
  host: "0.0.0.0"
  port: 8082

api_keys:
  - "client-proxy-key"

upstream:
  base_url: "https://api.openai.com/v1"
  api_key: "configured-openai-api-key"

model_map:
  claude-3-5-sonnet-20241022: "gpt-5.4"

