server:
  host: "0.0.0.0"
  port: 8082

api_keys:
  - "0123456789abcdef0123456789abcdef"

upstream:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  prefer_local_codex_credentials: true
  local_codex_auth_path: "~/.codex/auth.json"
  refresh_local_codex_tokens: true

model_map: {}

